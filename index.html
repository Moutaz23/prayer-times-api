<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gebetszeiten</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <section id="city">
      <h1 id="cityName">الرياض</h1>
      <p id="date">الجمعة 24 نوفمبر</p>
    </section>

    <section class="cards">
      <article class="card">
        <div class="card-header">
          <h2>الفجر</h2>
        </div>
        <div class="card-body">
          <p id="fajr">--:--</p>
        </div>
      </article>

      <article class="card">
        <div class="card-header">
          <h2>الشروق</h2>
        </div>
        <div class="card-body">
          <p id="sunrise">--:--</p>
        </div>
      </article>

      <article class="card">
        <div class="card-header">
          <h2>الظهر</h2>
        </div>
        <div class="card-body">
          <p id="dhuhr">--:--</p>
        </div>
      </article>

      <article class="card">
        <div class="card-header">
          <h2>العصر</h2>
        </div>
        <div class="card-body">
          <p id="asr">--:--</p>
        </div>
      </article>

      <article class="card">
        <div class="card-header">
          <h2>المغرب</h2>
        </div>
        <div class="card-body">
          <p id="maghrib">--:--</p>
        </div>
      </article>

      <article class="card">
        <div class="card-header">
          <h2>العشاء</h2>
        </div>
        <div class="card-body">
          <p id="isha">--:--</p>
        </div>
      </article>
    </section>

    <select
      class="select"
      id="cityes"
      aria-label="اختر المدينة"
    ></select>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="main.js"></script>
</body>

</html>
